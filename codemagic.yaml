# Cloud iOS build (no Mac needed). Free tier: 500 macOS minutes/month.
# Produces an UNSIGNED ipa -> install on the iPad from Windows with Sideloadly
# (signs at install time with a free Apple ID; app lasts 7 days, reinstall to renew).
workflows:
  ios-unsigned:
    name: iOS unsigned IPA
    instance_type: mac_mini_m2
    max_build_duration: 45
    environment:
      # Pinned to the version validated locally (flutter analyze clean, deps
      # resolved). 'stable' could float to a newer release that removed an API
      # we use; pin so the cloud build reproduces exactly what passed here.
      flutter: 3.44.5
    scripts:
      - name: Flutter packages
        script: cd mobile && flutter pub get
      - name: Build iOS (no codesign)
        script: |
          cd mobile
          flutter build ios --release --no-codesign
      - name: Package ipa
        script: |
          cd mobile/build/ios/iphoneos
          mkdir Payload
          cp -r Runner.app Payload/
          zip -qr OnDeviceAI.ipa Payload
    artifacts:
      - mobile/build/ios/iphoneos/OnDeviceAI.ipa

  # Android is far simpler than iOS: the release APK is signed with the debug
  # key (see android/app/build.gradle.kts), so it installs by just downloading
  # and tapping it on the phone — no signing, no cable, no Sideloadly. Built on
  # the Mac instance (same free plan the iOS build uses; a Mac has the Android
  # SDK too). Universal APK = runs on any phone ABI, at the cost of size.
  android-apk:
    name: Android APK
    instance_type: mac_mini_m2
    max_build_duration: 45
    environment:
      flutter: 3.44.5
    scripts:
      - name: Flutter packages
        script: cd mobile && flutter pub get
      - name: Build APK (release, debug-signed -> installable)
        script: cd mobile && flutter build apk --release
    artifacts:
      - mobile/build/app/outputs/flutter-apk/*.apk
