name: ondevice_ai
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  # llama.cpp (GGUF) on-device inference — open models, no HuggingFace token.
  lib_llama_cpp: ^0.7.3
  # On-device ONNX text embeddings (replaces nomic-embed/Ollama) — powers the
  # vector half of hybrid retrieval + centroid routing. MiniLM-L6-v2 via
  # bundled ONNX Runtime, built-in WordPiece tokenizer, no Rust toolchain.
  fonnx:
    git:
      url: https://github.com/Telosnex/fonnx.git
  dio: ^5.7.0                # model download with progress
  path_provider: ^2.1.5     # where to store the downloaded .gguf
  shared_preferences: ^2.5.5
  system_info_plus: ^0.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
